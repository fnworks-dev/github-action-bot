name: SideQuest Backfill Summaries

on:
  workflow_dispatch:
    inputs:
      since:
        description: "Backfill rows created_at >= this date (YYYY-MM-DD)"
        required: true
        default: "2026-03-12"
      limit:
        description: "Max rows to process"
        required: true
        default: "200"
      dry_run:
        description: "If true, does not write updates"
        required: true
        default: "true"
      sleep_ms:
        description: "Delay between rows (ms)"
        required: true
        default: "500"

jobs:
  backfill:
    if: github.repository == 'fnworks-dev/github-action-bot'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./sidequest-bot
        run: npm ci

      - name: Build
        working-directory: ./sidequest-bot
        run: npm run build

      - name: Backfill summaries
        working-directory: ./sidequest-bot
        env:
          TURSO_DATABASE_URL: ${{ secrets.SIDEQUEST_TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.SIDEQUEST_TURSO_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_BACKUP_KEY_1: ${{ secrets.GEMINI_BACKUP_KEY_1 }}
          GEMINI_BACKUP_KEY_2: ${{ secrets.GEMINI_BACKUP_KEY_2 }}
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
          NIM_MODEL: minimaxai/minimax-m2.5
          BACKFILL_SINCE: ${{ inputs.since }}
          BACKFILL_LIMIT: ${{ inputs.limit }}
          BACKFILL_DRY_RUN: ${{ inputs.dry_run }}
          BACKFILL_SLEEP_MS: ${{ inputs.sleep_ms }}
        run: npm run backfill:summaries
